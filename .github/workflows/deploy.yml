name: Build & blue-green deploy

# ────────────────────────────────────────────────────────────────────────────
# Universal Holy Grail blue-green deploy workflow — один для template repo
# (whg.sawking.tech) и для downstream-инстансов. Конкретику задают GH vars/secrets.
#
# Required GitHub Actions secrets:
#   VPS_HOST              IP или hostname production VPS
#   VPS_SSH_KEY           SSH private key для deploy user (см. whg-infisical skill)
#
# Required GitHub Actions variables:
#   VPS_USER              default 'deploy'
#   VPS_PATH              /opt/sites/<slug>
#   PUBLIC_URL            https://<your-domain>
#   PRIMARY_DOMAIN        <your-domain> — для pre-flight (nginx-conf + LE-cert)
#   INFISICAL_HOST_URL    https://infisical.<your-host> — shared self-host instance
#                         для всех WHG-сайтов на VPS (deploy.sh login через UA-creds
#                         в /etc/infisical/<slug>/).
#   PORT_BASE             (optional, default 3000) — per-site port allocation.
#                         Blue=PORT_BASE/+1, green=PORT_BASE+100/+101. Каждому сайту
#                         выделить +20: site-1 3000, site-2 3020, site-3 3040, …
#   IMAGE_NAME_PREFIX     (optional) override базы имени образов. Например для
#                         Vovanda/WebHolyGrail задай `whg` чтобы получилось
#                         ghcr.io/vovanda/whg-cms (не webholygrail-cms).
#                         Default = github.event.repository.name (lowercased).
#   GHCR_OWNER            (optional) default = github.repository_owner
# ────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  # «Частый пуш не должен ломать. Очереди не должно быть. Деплоить тупо последнее.»
  # При новом push'е текущий in-progress workflow отменяется, последний коммит
  # выигрывает. Safe: при cancel deploy.sh state — inactive color, active не
  # трогается, миграции применяются только когда дойдём до switch.
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # IMAGE_NAME_PREFIX позволяет переопределить базу имени образов (например для
  # template-repo с короткими именами `whg-cms/whg-client` вместо `WebHolyGrail-cms`).
  # По умолчанию берётся из github.event.repository.name (lowercased в meta-step).
  IMAGE_NAME_PREFIX: ${{ vars.IMAGE_NAME_PREFIX || github.event.repository.name }}
  GHCR_OWNER: ${{ vars.GHCR_OWNER || github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      cms_image: ${{ steps.meta.outputs.cms_image }}
      client_image: ${{ steps.meta.outputs.client_image }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: |
          # GHCR требует lowercase для owner И repo. Делаем сами, не полагаемся на caller.
          OWNER_LC=$(echo "${{ env.GHCR_OWNER }}" | tr '[:upper:]' '[:lower:]')
          PREFIX_LC=$(echo "${{ env.IMAGE_NAME_PREFIX }}" | tr '[:upper:]' '[:lower:]')
          echo "tag=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "cms_image=${{ env.REGISTRY }}/$OWNER_LC/$PREFIX_LC-cms" >> $GITHUB_OUTPUT
          echo "client_image=${{ env.REGISTRY }}/$OWNER_LC/$PREFIX_LC-client" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push cms
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/cms/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.cms_image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.cms_image }}:latest
          cache-from: type=gha,scope=cms
          cache-to: type=gha,scope=cms,mode=max

      - name: Build & push client
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/client/Dockerfile
          push: true
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
          tags: |
            ${{ steps.meta.outputs.client_image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.client_image }}:latest
          cache-from: type=gha,scope=client
          cache-to: type=gha,scope=client,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      VPS_USER: ${{ vars.VPS_USER || 'deploy' }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PATH: ${{ vars.VPS_PATH }}
      PUBLIC_URL: ${{ vars.PUBLIC_URL }}
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          # ssh-keyscan бывает пустой ответ при geo-задержках Azure↔MSK — до 3 попыток.
          for i in 1 2 3; do
            out=$(ssh-keyscan -T 15 -H "$VPS_HOST" 2>/dev/null || true)
            if [ -n "$out" ]; then
              echo "$out" >> ~/.ssh/known_hosts
              exit 0
            fi
            echo "ssh-keyscan attempt $i empty, retry in 5s"
            sleep 5
          done
          echo "::error::ssh-keyscan вернул пустоту за 3 попытки"
          exit 1

      - name: Sync site directory on VPS (git pull)
        run: |
          # ssh -o ConnectTimeout=15 — не висеть 2 мин при packet loss из Azure
          ssh -o ConnectTimeout=15 -o ServerAliveInterval=10 -o ServerAliveCountMax=3 "$VPS_USER@$VPS_HOST" \
            "cd $VPS_PATH && git fetch --depth 50 origin main && git reset --hard origin/main"

      - name: Blue-green deploy
        env:
          GHCR_OWNER_LC: ${{ env.GHCR_OWNER }}
          PRIMARY_DOMAIN: ${{ vars.PRIMARY_DOMAIN }}
          INFISICAL_HOST_URL: ${{ vars.INFISICAL_HOST_URL }}
          PORT_BASE: ${{ vars.PORT_BASE }}
        run: |
          OWNER_LC=$(echo "$GHCR_OWNER_LC" | tr '[:upper:]' '[:lower:]')
          # PRIMARY_DOMAIN: pre-flight на первом деплое (nginx-conf + LE-cert).
          # INFISICAL_HOST_URL: shared self-host instance для всех WHG-инстансов.
          # PORT_BASE: per-site port allocation (3000 для первого, 3020/3040/... для следующих).
          ssh -o ConnectTimeout=15 -o ServerAliveInterval=10 -o ServerAliveCountMax=6 "$VPS_USER@$VPS_HOST" \
            "GHCR_OWNER=$OWNER_LC PRIMARY_DOMAIN=$PRIMARY_DOMAIN INFISICAL_HOST_URL=$INFISICAL_HOST_URL PORT_BASE=$PORT_BASE $VPS_PATH/deploy/prod/deploy.sh ${{ needs.build.outputs.tag }}"

      - name: Verify deployed SHA
        run: |
          EXPECTED=$(echo ${{ github.sha }} | cut -c1-7)
          # Подождём 10 сек на nginx warm-up after reload
          sleep 10
          if [ -z "$PUBLIC_URL" ]; then
            echo "::warning::PUBLIC_URL variable not set — skipping SHA verify"
            exit 0
          fi
          DEPLOYED=$(curl -sf "$PUBLIC_URL/api/health" | jq -r '.sha' || echo "unknown")
          echo "expected: $EXPECTED"
          echo "deployed: $DEPLOYED"
          if [ "$EXPECTED" != "$DEPLOYED" ]; then
            echo "::error::SHA mismatch — image не из этого commit'а!"
            exit 1
          fi
