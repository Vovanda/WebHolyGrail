name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version берётся из package.json:packageManager (без явного override)
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # payload-types.ts и importMap.js gitignored (генерируются на dev/build) —
      # в чистом checkout их нет, tsc падает. Dummy env: конфиг только грузится,
      # коннекта к S3/DB нет.
      - name: Generate Payload artifacts
        env:
          PAYLOAD_SECRET: ci-dummy-not-used
          DATABASE_URI: file:/tmp/ci.db
          S3_BUCKET: ci-dummy
          S3_REGION: us-east-1
          S3_ENDPOINT: https://ci.invalid
          S3_ACCESS_KEY_ID: ci-dummy
          S3_SECRET_ACCESS_KEY: ci-dummy
        run: |
          pnpm --filter cms run generate:types
          pnpm --filter cms run generate:importmap

      - run: pnpm -r lint

      - run: pnpm -r test
