# Holy Grail host-nginx — глобальный конфиг.
# Vhost'ы в conf.d/<domain>.conf (per-site).

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 8192;
    multi_accept on;
    use epoll;
}

http {
    # --- базовые ---
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    charset utf-8;
    server_tokens off;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_names_hash_bucket_size 128;
    client_max_body_size 100M;

    # --- логи ---
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main buffer=16k flush=10s;
    error_log /var/log/nginx/error.log warn;

    # --- сжатие ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml font/woff font/woff2;

    # --- защита от мусорных запросов ---
    map $http_user_agent $block_scanner {
        default 0;
        ~*(nmap|nikto|wikto|sqlmap|sf|wpscan|netsparker|webinspector|whatweb|openvas|jbroFuzz|libwww|nessus|wsdler|wfuzz) 1;
    }
    map $request_uri $block_phpbot {
        default 0;
        ~*(\.php|\.aspx|wp-login|xmlrpc|wp-admin|/admin\.php|\.env|\.git/) 1;
    }

    # --- rate limit для /api (по умолчанию умеренный) ---
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # --- HTTP/3 ssl session cache ---
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # --- catch-all default — для голых IP / неизвестных доменов отдаём 444 ---
    # ACME-challenge для Let's Encrypt доступен на любом домене через webroot
    # (certbot пишет в /var/www/certbot, nginx читает оттуда).
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        location / {
            return 444;
        }
    }

    # --- vhost'ы per-site ---
    include /etc/nginx/conf.d/*.conf;
}
