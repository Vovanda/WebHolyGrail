# «lite» production stack — только cms + client, без своего nginx/certbot.
# Используется когда у VPS уже есть host-nginx с Let's Encrypt
# (например root-домен уже терминирует TLS, поддомены идут через тот же nginx).
#
# Запуск (на сервере):
#   docker compose --env-file deploy/prod/.env.production \
#     -f deploy/prod/docker-compose.lite.yml up -d --build
#
# host-nginx должен проксировать (пример `conf.d/<site>.conf`):
#   /admin /api /_payload /_next/data → 127.0.0.1:3001 (cms)
#   /                                  → 127.0.0.1:3000 (client)
#
# Все имена параметризованы через ${SITE_SLUG} — обязательная переменная.

services:
  cms:
    container_name: ${SITE_SLUG:?required}-cms
    build:
      context: ../..
      dockerfile: src/cms/Dockerfile
      # host network для build — buildkit изолированная сеть без DNS, корепак не качает pnpm
      network: host
    environment:
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?required}
      DATABASE_URI: file:/data/${SITE_SLUG}.db
      PAYLOAD_PUBLIC_SERVER_URL: ${PAYLOAD_PUBLIC_SERVER_URL:?required}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?required}
      NODE_ENV: production
      S3_BUCKET: ${S3_BUCKET:?required}
      S3_REGION: ${S3_REGION:?required}
      S3_ENDPOINT: ${S3_ENDPOINT:?required}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?required}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?required}
      ADMIN_INITIAL_EMAIL: ${ADMIN_INITIAL_EMAIL:?required}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:?required}
    volumes:
      # bind-mount БД с хоста — виден простым `ls`, бэкапится через `cp`/`sqlite3 .backup`,
      # не зависит от состояния docker-volume. .dockerignore исключает data/*.db из build context.
      - ../../src/cms/data:/data
    ports:
      # Только loopback — наружу через host-nginx
      - '127.0.0.1:3001:3001'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O- http://localhost:3001/api/access || exit 1']
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 3
    restart: unless-stopped
    # Compose-created bridge не наследует daemon-level DNS; задаём явно для runtime.
    # Cloudflare + Google + Yandex — fallback в нужном порядке.
    dns:
      - 1.1.1.1
      - 8.8.8.8
      - 77.88.8.8
      - 77.88.8.1

  client:
    container_name: ${SITE_SLUG:?required}-client
    build:
      context: ../..
      dockerfile: src/client/Dockerfile
      network: host
    environment:
      # Client SSR ходит к CMS внутри docker-network через service-name.
      NEXT_PUBLIC_CMS_URL: http://cms:3001
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?required}
      NODE_ENV: production
    ports:
      - '127.0.0.1:3000:3000'
    depends_on:
      cms:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O- http://localhost:3000/ || exit 1']
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
      - 77.88.8.8
      - 77.88.8.1
