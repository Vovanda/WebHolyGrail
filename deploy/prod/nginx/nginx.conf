# nginx — reverse proxy для prod stack.
#
# Терминирует TLS (Let's Encrypt через certbot контейнер).
# Маршруты:
#   /              → client (Next 15 SSR) :3000
#   /admin/*       → cms (Payload admin)   :3001
#   /api/*         → cms (Payload REST)    :3001
#
# Подключаемые сайты — `conf.d/*.conf`. Базовая конфигурация ниже.

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 8192;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;

  # Сжатие
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    text/plain text/css text/javascript application/javascript application/json
    application/xml application/rss+xml image/svg+xml font/woff2;

  # Безопасность по умолчанию
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-XSS-Protection "1; mode=block" always;

  # Логи
  log_format combined_main
    '$remote_addr - $remote_user [$time_local] "$request" '
    '$status $body_bytes_sent "$http_referer" '
    '"$http_user_agent" "$http_x_forwarded_for" rt=$request_time';
  access_log /var/log/nginx/access.log combined_main;
  error_log /var/log/nginx/error.log warn;

  # Upstreams
  upstream site_client { server client:3000; keepalive 32; }
  upstream site_cms { server cms:3001; keepalive 16; }

  include /etc/nginx/conf.d/*.conf;
}
