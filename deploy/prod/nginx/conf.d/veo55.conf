# veo55.ru / *.veo55.ru — production virtual host.
#
# Подменить `${DOMAIN}` плейсхолдеры на реальный домен (например `new.veo55.ru`
# на стадии переезда — оставив legacy `veo55.ru` Joomla работать параллельно;
# или просто `veo55.ru` после полного переезда).

# --- HTTP → HTTPS redirect ---
server {
  listen 80;
  listen [::]:80;
  server_name veo55.ru www.veo55.ru;

  # Let's Encrypt http-01 challenge
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# --- HTTPS ---
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name veo55.ru www.veo55.ru;

  ssl_certificate /etc/letsencrypt/live/veo55.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/veo55.ru/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  # HSTS (включить только когда уверен что HTTPS стабилен — иначе пользователь
  # залочен на https навсегда и любой fallback на http не работает).
  # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

  client_max_body_size 50M;  # медиа upload

  # --- /admin → Payload CMS ---
  location ^~ /admin {
    proxy_pass http://veo55_cms;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 90;
    proxy_buffering off;
  }

  # --- /api → Payload REST ---
  location ^~ /api {
    proxy_pass http://veo55_cms;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 90;
    proxy_buffering off;
  }

  # --- / → Next client (SSR) ---
  location / {
    proxy_pass http://veo55_client;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 60;
  }
}
