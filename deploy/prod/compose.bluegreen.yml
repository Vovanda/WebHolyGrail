# Blue-green production stack.
# Запускается per-color через separate compose projects:
#   COLOR=blue  CMS_PORT=3001 CLIENT_PORT=3000 TAG=<sha> \
#     docker compose -p ${SITE_SLUG}-blue --env-file .env.production -f compose.bluegreen.yml up -d
#   COLOR=green CMS_PORT=3011 CLIENT_PORT=3010 TAG=<sha> \
#     docker compose -p ${SITE_SLUG}-green --env-file .env.production -f compose.bluegreen.yml up -d
#
# Управление — через scripts/deploy.sh (определяет active color, делает switch).
# nginx upstream симлинк → /etc/nginx/snippets/${SITE_SLUG}-upstream-active.conf.
#
# БД (SQLite) — bind-mount, общая для обоих цветов. Миграции — backward-compatible
# (см. payload-migration skill, раздел "Blue-green safety").
#
# Внешняя сеть — общая для обоих цветов, создаётся заранее:
#   docker network create ${SITE_SLUG}-net

services:
  cms:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${GHCR_OWNER:?required}/${SITE_SLUG:?required}-cms:${TAG:-latest}
    container_name: ${SITE_SLUG}-cms-${COLOR:?required}
    environment:
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?required}
      DATABASE_URI: file:/data/${SITE_SLUG}.db
      PAYLOAD_PUBLIC_SERVER_URL: ${PAYLOAD_PUBLIC_SERVER_URL:?required}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?required}
      NODE_ENV: production
      S3_BUCKET: ${S3_BUCKET:?required}
      S3_REGION: ${S3_REGION:?required}
      S3_ENDPOINT: ${S3_ENDPOINT:?required}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?required}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?required}
      ADMIN_INITIAL_EMAIL: ${ADMIN_INITIAL_EMAIL:?required}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:?required}
    volumes:
      - ../../src/cms/data:/data
    ports:
      - '127.0.0.1:${CMS_PORT:?required}:3001'
    networks:
      - site-net
    dns:
      - 1.1.1.1
      - 8.8.8.8
      - 77.88.8.8
      - 77.88.8.1
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O- http://localhost:3001/api/access || exit 1']
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 6
    restart: unless-stopped

  client:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${GHCR_OWNER:?required}/${SITE_SLUG:?required}-client:${TAG:-latest}
    container_name: ${SITE_SLUG}-client-${COLOR:?required}
    environment:
      # SSR ходит к своему же cms по container_name внутри shared network ${SITE_SLUG}-net.
      NEXT_PUBLIC_CMS_URL: http://${SITE_SLUG}-cms-${COLOR}:3001
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?required}
      NODE_ENV: production
      # Прокидываем COLOR в runtime для /api/health → debug какой цвет сейчас работает.
      COLOR: ${COLOR:?required}
    ports:
      - '127.0.0.1:${CLIENT_PORT:?required}:3000'
    networks:
      - site-net
    dns:
      - 1.1.1.1
      - 8.8.8.8
      - 77.88.8.8
      - 77.88.8.1
    depends_on:
      cms:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O- http://localhost:3000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 6
    restart: unless-stopped

networks:
  site-net:
    external: true
    name: ${SITE_SLUG}-net
