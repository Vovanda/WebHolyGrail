# Local stack for veo55 site.
#
# Запуск:
#   infisical run --env=dev -- docker compose -f sites/veo55/deploy/local/docker-compose.yml up -d
# Или из корня:
#   pnpm compose:up
#
# Build context — корень монорепо (нам нужен pnpm-workspace + contracts), пути к
# Dockerfile — относительно того же корня. Это даёт Docker доступ ко всем нужным
# workspace-пакетам при сборке через `pnpm install --filter`.

services:
  cms:
    container_name: veo55-cms
    build:
      context: ../../../..
      dockerfile: sites/veo55/src/cms/Dockerfile
    environment:
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?must be injected via infisical run}
      DATABASE_URI: file:/data/veo55.db
      PAYLOAD_PUBLIC_SERVER_URL: ${PAYLOAD_PUBLIC_SERVER_URL:-http://localhost:3001}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NODE_ENV: production
    volumes:
      - veo55_db:/data
      - veo55_media:/app/sites/veo55/src/cms/media
    ports:
      - '3001:3001'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O- http://localhost:3001/api/access || exit 1']
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    restart: unless-stopped
    networks:
      - veo55-net

  client:
    container_name: veo55-client
    build:
      context: ../../../..
      dockerfile: sites/veo55/src/client/Dockerfile
    environment:
      NEXT_PUBLIC_CMS_URL: http://cms:3001
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      cms:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O- http://localhost:3000/ || exit 1']
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    restart: unless-stopped
    networks:
      - veo55-net

volumes:
  veo55_db:
    name: veo55_db
  veo55_media:
    name: veo55_media

networks:
  veo55-net:
    name: veo55-net
    driver: bridge
