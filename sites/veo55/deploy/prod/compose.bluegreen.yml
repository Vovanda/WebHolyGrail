# Blue-green production stack для veo55.
# Запускается per-color через separate compose projects:
#   COLOR=blue  CMS_PORT=3001 CLIENT_PORT=3000 TAG=<sha> \
#     docker compose -p veo55-blue --env-file .env.production -f compose.bluegreen.yml up -d
#   COLOR=green CMS_PORT=3011 CLIENT_PORT=3010 TAG=<sha> \
#     docker compose -p veo55-green --env-file .env.production -f compose.bluegreen.yml up -d
#
# Управление — через scripts/deploy.sh (определяет active color, делает switch).
# nginx upstream симлинк → /etc/nginx/snippets/veo55-upstream-active.conf.
#
# БД (SQLite) — bind-mount, общая для обоих цветов. Миграции — backward-compatible
# (см. payload-migration skill, раздел "Blue-green safety").

services:
  cms:
    image: ghcr.io/${GHCR_OWNER:-vovanda}/veo55-cms:${TAG:-latest}
    container_name: veo55-cms-${COLOR:?required}
    environment:
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?required}
      DATABASE_URI: file:/data/veo55.db
      PAYLOAD_PUBLIC_SERVER_URL: ${PAYLOAD_PUBLIC_SERVER_URL:?required}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?required}
      NODE_ENV: production
      S3_BUCKET: ${S3_BUCKET:?required}
      S3_REGION: ${S3_REGION:?required}
      S3_ENDPOINT: ${S3_ENDPOINT:?required}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?required}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?required}
      VEO_VK_GROUP_ID: ${VEO_VK_GROUP_ID:?required}
      VEO_VK_APP_ID: ${VEO_VK_APP_ID:?required}
      VEO_VK_SVC_TOKEN: ${VEO_VK_SVC_TOKEN:?required}
      VEO_VK_API_VER: ${VEO_VK_API_VER:-5.131}
      ADMIN_INITIAL_EMAIL: ${ADMIN_INITIAL_EMAIL:?required}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:?required}
    volumes:
      - ../../src/cms/data:/data
    ports:
      - '127.0.0.1:${CMS_PORT:?required}:3001'
    networks:
      - veo55-net
    dns:
      - 77.88.8.8
      - 77.88.8.1
      - 8.8.8.8
      - 1.1.1.1
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O- http://localhost:3001/api/access || exit 1']
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 6
    restart: unless-stopped

  client:
    image: ghcr.io/${GHCR_OWNER:-vovanda}/veo55-client:${TAG:-latest}
    container_name: veo55-client-${COLOR:?required}
    environment:
      # SSR ходит к своему же cms по container_name внутри shared network veo55-net
      NEXT_PUBLIC_CMS_URL: http://veo55-cms-${COLOR}:3001
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?required}
      NODE_ENV: production
    ports:
      - '127.0.0.1:${CLIENT_PORT:?required}:3000'
    networks:
      - veo55-net
    dns:
      - 77.88.8.8
      - 77.88.8.1
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      cms:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O- http://localhost:3000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 6
    restart: unless-stopped

# Внешняя сеть — общая для обоих цветов, чтобы container_name резолвился.
# Создаётся заранее: docker network create veo55-net
networks:
  veo55-net:
    external: true
    name: veo55-net
