# veo.sawking.tech — production veo55 (Holy Grail).
#
# Заменяет .tmp/veo.conf (демо-tunnel) на прямой proxy в локальный docker.
# Стек живёт в /srv/veo55, поднят через docker-compose.lite.yml:
#   client → 127.0.0.1:3000 (Next 15)
#   cms    → 127.0.0.1:3001 (Payload 3.x)
#
# Установка на VPS:
#   sudo cp /srv/veo55/sites/veo55/deploy/prod/veo-sawking-tech.conf \
#          /opt/SawkingTech/nginx/conf.d/veo.conf
#   sudo docker exec sawking-nginx nginx -t  # или systemctl reload nginx
#   sudo docker exec sawking-nginx nginx -s reload

# HTTP — ACME challenge + redirect на HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name veo.sawking.tech;

    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html/acme;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — терминируем TLS, проксируем в docker-стек.
server {
    listen 443 quic;
    listen 443 ssl;
    http2 on;
    server_name veo.sawking.tech;
    add_header Alt-Svc 'h3=":443"; ma=60';

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_certificate /etc/letsencrypt/live/veo.sawking.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/veo.sawking.tech/privkey.pem;
    ssl_buffer_size 4k;
    ssl_session_timeout 2d;
    ssl_session_tickets off;

    if ($block_scanner) { return 444; }
    if ($block_phpbot)  { return 444; }
    client_max_body_size 100M;

    # Общие proxy-параметры
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_buffering off;
    proxy_read_timeout 90s;

    # --- Payload (CMS) ---
    location /admin            { proxy_pass http://172.17.0.1:3001; }
    location /api              { proxy_pass http://172.17.0.1:3001; }
    location /_payload         { proxy_pass http://172.17.0.1:3001; }
    location /admin-resources  { proxy_pass http://172.17.0.1:3001; }

    # /_next/ — общий префикс между Payload-admin (3001) и Next-client (3000).
    # Различаем по Referer: пришёл с /admin — в Payload, иначе — в client.
    location /_next/ {
        set $next_upstream http://172.17.0.1:3000;
        if ($http_referer ~* "/admin") {
            set $next_upstream http://172.17.0.1:3001;
        }
        proxy_pass $next_upstream;
    }

    # --- Next client (site) ---
    location / {
        proxy_pass http://172.17.0.1:3000;
    }
}
