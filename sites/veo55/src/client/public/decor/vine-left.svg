<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 800" width="80" height="800" preserveAspectRatio="xMidYMin meet">
  <!-- Лоза ЛЕВАЯ. Шире (80px), выше (800px), более витиеватая с петлями вверх. Прозрачная.
       Усики направлены вверх и наружу — как настоящая лоза тянется к свету. -->
  <g stroke="#A8802A" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.35">
    <!-- ОСНОВНОЙ СТЕБЕЛЬ — большие плавные витки, иногда петля наверх -->
    <path d="M40 6
             C 28 28, 56 48, 40 78
             C 24 110, 60 138, 40 170
             C 22 200, 60 232, 40 268
             C 28 296, 56 322, 40 352
             C 30 376, 50 400, 40 430
             C 24 460, 58 492, 40 524
             C 24 552, 60 582, 40 614
             C 28 638, 56 666, 40 696
             C 34 720, 46 746, 40 776" stroke-width="1.4"/>

    <!-- СЕКЦИЯ 1 (0..200): крупные витки с петлями вверх -->
    <!-- Усик 1: длинная вытянутая спираль, конец вверх-вправо -->
    <path d="M40 36
             C 58 30, 70 22, 68 8
             C 64 -2, 56 0, 56 8
             C 56 14, 60 16, 64 14"/>
    <!-- Усик 2: петля рисуется вверх -->
    <path d="M40 100
             C 60 92, 74 78, 70 60
             C 64 50, 54 52, 56 64
             C 58 72, 64 72, 66 68"/>
    <!-- Усик 3: короткий вверх с двойным завитком -->
    <path d="M40 170
             C 56 162, 64 150, 62 138
             C 58 132, 52 134, 54 142"/>

    <!-- СЕКЦИЯ 2 (200..500): тугие частые завитки направленные вверх -->
    <path d="M40 220 C 58 212, 68 200, 66 186 C 62 178, 54 180, 56 188" stroke-width="1.05"/>
    <path d="M40 280 C 60 274, 72 260, 68 244 C 64 234, 56 238, 58 248 C 60 256, 66 254, 68 250"/>
    <path d="M40 340 C 58 332, 64 322, 62 312" stroke-width="1.05"/>
    <path d="M40 400 C 60 396, 74 384, 72 368 C 68 358, 58 360, 60 370 C 62 378, 68 378, 70 374"/>
    <path d="M40 460 C 56 452, 62 442, 60 432" stroke-width="1.05"/>

    <!-- СЕКЦИЯ 3 (500..800): широкие изящные росчерки -->
    <path d="M40 540
             C 62 532, 76 516, 72 496
             C 64 486, 54 492, 58 504
             C 62 514, 70 510, 70 506"/>
    <path d="M40 620 C 58 614, 66 602, 64 590" stroke-width="1.05"/>
    <path d="M40 700
             C 60 692, 72 678, 70 660
             C 66 650, 56 652, 58 662
             C 60 670, 66 670, 68 666"/>
    <path d="M40 760 C 58 754, 66 744, 64 732" stroke-width="1.05"/>
  </g>

  <!-- Капельки на концах усиков -->
  <g fill="#A8802A" opacity="0.4">
    <circle cx="64" cy="14" r="1.8"/>
    <circle cx="66" cy="68" r="1.8"/>
    <circle cx="54" cy="142" r="1.6"/>
    <circle cx="56" cy="188" r="1.6"/>
    <circle cx="68" cy="250" r="1.7"/>
    <circle cx="62" cy="312" r="1.5"/>
    <circle cx="70" cy="374" r="1.7"/>
    <circle cx="60" cy="432" r="1.5"/>
    <circle cx="70" cy="506" r="1.8"/>
    <circle cx="64" cy="590" r="1.5"/>
    <circle cx="68" cy="666" r="1.7"/>
    <circle cx="64" cy="732" r="1.5"/>
  </g>
</svg>
