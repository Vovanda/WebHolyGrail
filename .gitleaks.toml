# Web Holy Grail — gitleaks config.
# Extends gitleaks default ruleset. Local allowlist below.
# Default rules: https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml

[extend]
useDefault = true

[allowlist]
description = "Project allowlist — paths and patterns safe to skip"
# File paths (regex matched against full path)
paths = [
  '''\.env\.example$''',
  '''\.env\..*\.example$''',
  '''docs/secrets/.*\.md$''',
  '''pnpm-lock\.yaml$''',
  '''package-lock\.json$''',
  '''CHANGELOG\.md$''',
  '''.*/__fixtures__/.*''',
  '''.*\.test\.(ts|tsx|js|jsx)$''',
  '''.*\.spec\.(ts|tsx|js|jsx)$''',
  # Скачанные официальные AI-skills (Infisical, payloadcms) — read-only docs,
  # содержат example tokens/secrets как code snippets. Мы не правим их inline,
  # они переcкачиваются через `npx skills add` overwrite — поэтому paths,
  # а не inline `# gitleaks:allow`.
  '''\.claude/skills/infisical-[^/]+/.*''',
  '''\.claude/skills/cms-migration/.*''',
  '''\.claude/skills/payload/.*''',
]
# Для наших файлов (CLAUDE.md, docs/whg/, holygrail-*, payload-jobs,
# payload-migration) — НЕ paths-allowlist, а inline `# gitleaks:allow`
# на конкретной строке когда нужно (точечная амнистия false positive).
# Patterns that look like secrets but are placeholders/docs
regexes = [
  # docs/secrets/README.md uses placeholder service-token example
  '''st\.xxxxxxxx\.\.\.''',
  # обычные плейсхолдеры в .env.example
  '''=\s*$''',
  '''(EXAMPLE|PLACEHOLDER|YOUR_KEY_HERE|<.*>|\$\{[^}]+\})''',
]
